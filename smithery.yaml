name: agent-delegation-mcp
description: 'Agent Delegation MCP server. Tools: create task, delegate task, get
  task status. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: create_task
  description: Create a new delegatable task. Required capabilities as comma-separated
    string.
  parameters:
  - name: title
    type: string
    required: true
  - name: description
    type: string
    required: true
  - name: priority
    type: string
    required: false
  - name: required_capabilities
    type: string
    required: false
  - name: timeout_seconds
    type: integer
    required: false
- name: delegate_task
  description: Assign a pending task to a specific agent.
  parameters:
  - name: task_id
    type: string
    required: true
  - name: agent_id
    type: string
    required: true
- name: get_task_status
  description: Check the current status and progress of a task.
  parameters:
  - name: task_id
    type: string
    required: true
  - name: include_history
    type: boolean
    required: false
- name: list_available_agents
  description: List all registered agents and their capabilities. Optionally filter
    by required capability.
  parameters:
  - name: capability_filter
    type: string
    required: false
- name: complete_task
  description: Mark a task as complete with results, or as failed with error details.
  parameters:
  - name: task_id
    type: string
    required: true
  - name: result
    type: string
    required: true
  - name: success
    type: boolean
    required: false
